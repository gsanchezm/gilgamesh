# Local validation of the STAGING IMAGE (spec staging-deploy §4). Not a dev environment.
# Delta vs Azure: NODE_ENV/VAULT_MODE — the prod-like vault path needs Managed Identity (S20).
# Run with:  docker compose -f docker-compose.staging.yml up -d --build --wait
# (--wait blocks until the app healthcheck passes; a failed migration exits the container visibly.)

# Explicit project name (review B F1): without it, running from the repo root reuses the DEV
# compose project ("gilgamesh") and RECREATES/DESTROYS the dev postgres container.
name: gilgamesh-staging

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: gilgamesh
      POSTGRES_PASSWORD: gilgamesh
      POSTGRES_DB: gilgamesh
    healthcheck:
      # -h 127.0.0.1 forces TCP (review B F3): during first-boot initdb the temporary server is
      # socket-only — a socket pg_isready reports ready before the real server listens on TCP.
      test: ['CMD-SHELL', 'pg_isready -h 127.0.0.1 -U gilgamesh -d gilgamesh']
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - '3001:3001'
    environment:
      DATABASE_URL: postgresql://gilgamesh:gilgamesh@postgres:5432/gilgamesh?schema=public
      NODE_ENV: development
      VAULT_MODE: offline
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # node:22-slim has no curl; start_period covers migrate deploy + swc-node boot (review B F3).
      test: ['CMD', 'node', '-e', "fetch('http://127.0.0.1:3001/api/v1/health').then((r)=>process.exit(r.ok?0:1),()=>process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 30s
