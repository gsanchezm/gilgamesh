name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: CI only reads the repo (no writes, packages, or security events).
permissions:
  contents: read

# Belt+braces: force every external-provider seam to its deterministic stub across ALL jobs, so
# even a real key leaked into the CI environment (repo/org secret, cached env) can never make a job
# reach a live provider. The test harnesses already pin these in their own setup (apps/api/test/
# setup.ts, cucumber.cjs) and the Playwright webServer re-pins them for the booted API; this is the
# outer, job-independent guard.
#
# Two of these five carry a security INVERSION — VAULT_MODE (S20) and SSO_MODE (S15) — where
# `offline` is REFUSED under NODE_ENV=production (a silent stub there would hold live secrets /
# bypass auth). The other three (BRAIN/EMAIL/PAYMENTS) are the plain missing-config->stub pattern,
# so `offline` is safe under any NODE_ENV. Setting all five at the workflow level is therefore safe
# ONLY because NO CI job runs NODE_ENV=production — the two inverted pins are always accepted.
# (If a future job is moved to NODE_ENV=production — e.g. wiring the Docker image / staging smoke
# into CI — it MUST override both VAULT_MODE and SSO_MODE at the job level, not inherit these.)
# The e2e API is booted by Playwright with an explicit NODE_ENV=development + these same offline
# values, so it is safe by construction regardless of what this workflow env holds.
env:
  BRAIN_MODE: offline
  SSO_MODE: offline
  EMAIL_MODE: offline
  PAYMENTS_MODE: offline
  VAULT_MODE: offline

jobs:
  quality:
    name: Typecheck + Docker-free tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0 (pinned; version from package.json)
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Prisma generate (api typecheck needs the client types)
        run: pnpm --filter @gilgamesh/api prisma:generate
      - name: Lint (architecture boundaries + react-hooks)
        run: pnpm lint
      - name: Typecheck
        run: pnpm -r typecheck
      - name: Unit + e2e (in-memory, Docker-free)
        run: pnpm -r test

  database:
    name: Integration + BDD (Postgres + Redis)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: gilgamesh
          POSTGRES_PASSWORD: gilgamesh
          POSTGRES_DB: gilgamesh
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U gilgamesh -d gilgamesh"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      DATABASE_URL: postgresql://gilgamesh:gilgamesh@localhost:5432/gilgamesh?schema=public
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Prisma generate
        run: pnpm --filter @gilgamesh/api prisma:generate
      - name: Enable Postgres extensions (mirrors docker/postgres/init.sql)
        run: PGPASSWORD=gilgamesh psql -h localhost -U gilgamesh -d gilgamesh -c "CREATE EXTENSION IF NOT EXISTS vector; CREATE EXTENSION IF NOT EXISTS citext;"
      - name: Apply migrations
        run: pnpm --filter @gilgamesh/api db:deploy
      - name: Integration tests (real Postgres + Redis)
        run: pnpm --filter @gilgamesh/api test:int
      - name: BDD acceptance
        run: pnpm --filter @gilgamesh/api test:bdd

  bundle:
    name: Bundle size (web)
    runs-on: ubuntu-latest
    # Dedicated job (isolated signal). CI never otherwise builds the web — the e2e job serves it
    # via the vite DEV server — so this is a single `vite build`, not a duplicate one. It resolves
    # only @gilgamesh/domain + @gilgamesh/ui (vite aliases), so no Prisma client / DB is needed.
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build web + enforce gzipped-size budget (apps/web/bundle-budget.json)
        run: pnpm --filter @gilgamesh/web bundle-size

  e2e:
    name: Playwright (browser e2e)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: gilgamesh
          POSTGRES_PASSWORD: gilgamesh
          POSTGRES_DB: gilgamesh
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U gilgamesh -d gilgamesh"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      DATABASE_URL: postgresql://gilgamesh:gilgamesh@localhost:5432/gilgamesh?schema=public
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Prisma generate
        run: pnpm --filter @gilgamesh/api prisma:generate
      - name: Enable Postgres extensions
        run: PGPASSWORD=gilgamesh psql -h localhost -U gilgamesh -d gilgamesh -c "CREATE EXTENSION IF NOT EXISTS vector; CREATE EXTENSION IF NOT EXISTS citext;"
      - name: Apply migrations
        run: pnpm --filter @gilgamesh/api db:deploy
      - name: Install Playwright chromium
        run: pnpm --filter @gilgamesh/web exec playwright install --with-deps chromium
      - name: Browser e2e (boots the real web+api stack)
        run: pnpm --filter @gilgamesh/web test:e2e
