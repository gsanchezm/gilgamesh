# Local-first dev infrastructure. Slice 1 only needs Postgres.
# Redis (BullMQ) and MinIO (artifacts) are added in later slices.
services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: gilgamesh-postgres
    environment:
      POSTGRES_USER: gilgamesh
      POSTGRES_PASSWORD: gilgamesh
      POSTGRES_DB: gilgamesh
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U gilgamesh -d gilgamesh']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
