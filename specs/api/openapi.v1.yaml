# =======================================================================================
# COMPONENTS
# =======================================================================================
components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: __Host-gg_session
      description: |
        `__Host-`-prefixed, httpOnly + Secure + SameSite=Lax session cookie issued by `/auth/login` or
        `/auth/register` (slice 1, local auth). The `__Host-` prefix structurally forces `Secure`,
        `Path=/`, and no `Domain`. The session binds the user and the active `orgId` used for tenant
        resolution. Swappable to OIDC later behind the `IdentityProvider` port without contract change.
        **Cookie auth alone is not sufficient for unsafe methods** — they additionally require the
        `csrfToken` double-submit header (see below).
    csrfToken:
      type: apiKey
      in: header
      name: X-CSRF-Token
      description: |
        Double-submit CSRF token. Required on every **unsafe** method (`POST`/`PATCH`/`PUT`/`DELETE`)
        whenever the request is authenticated by the session cookie. Its value MUST equal the
        non-HttpOnly `csrf` cookie set alongside the session cookie. A missing or mismatched token →
        `403` (`code: CSRF_FAILED`). Not required for safe methods or the public `/auth/*` endpoints.

  parameters:
    OrgId:
      name: orgId
      in: path
      required: true
      description: Org (root tenant) id. Must be one of the caller's memberships.
      schema: { type: string, format: uuid }
    PathId:
      name: id
      in: path
      required: true
      description: Resource id (UUID v7) of the resource named by the path.
      schema: { type: string, format: uuid }
    Slot:
      name: slot
      in: path
      required: true
      description: Agent slot key (keystone §3).
      schema: { $ref: '#/components/schemas/AgentSlot' }
    NodeId:
      name: nodeId
      in: path
      required: true
      description: RunNode id.
      schema: { type: string, format: uuid }
    IntegrationKey:
      name: key
      in: path
      required: true
      description: Stable integration key (keystone §8).
      schema: { type: string }
    Cursor:
      name: cursor
      in: query
      required: false
      description: Opaque pagination cursor returned as `page.nextCursor` by the previous page.
      schema: { type: string }
    Limit:
      name: limit
      in: query
      required: false
      description: Max items per page.
      schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
    IfNoneMatch:
      name: If-None-Match
      in: header
      required: false
      description: Conditional GET — pass the previously returned `ETag`; a still-fresh resource yields `304`.
      schema: { type: string }

  headers:
    ETag:
      description: Entity tag for the representation; use with `If-None-Match` for conditional GETs.
      schema: { type: string }
    CacheControl:
      description: Client-cache directive (e.g. `private, max-age=30, must-revalidate`).
      schema: { type: string }
    RateLimitLimit:
      description: Request quota for the current window.
      schema: { type: integer }
    RateLimitRemaining:
      description: Requests remaining in the current window.
      schema: { type: integer }
    RateLimitReset:
      description: Unix epoch seconds when the window resets.
      schema: { type: integer }
    RetryAfter:
      description: Seconds the client should wait before retrying.
      schema: { type: integer }

  responses:
    Unauthorized:
      description: Missing or invalid session.
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
          example:
            type: "https://gilgamesh.example/problems/unauthorized"
            title: Unauthorized
            status: 401
            code: UNAUTHENTICATED
            detail: A valid session is required.
    Forbidden:
      description: Authenticated but not permitted (RBAC or cross-tenant).
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
          example:
            type: "https://gilgamesh.example/problems/forbidden"
            title: Forbidden
            status: 403
            code: FORBIDDEN
            detail: Your role does not allow this action.
    CsrfFailed:
      description: Missing or mismatched CSRF token on an unsafe method (cookie auth).
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
          example:
            type: "https://gilgamesh.example/problems/csrf-failed"
            title: Forbidden
            status: 403
            code: CSRF_FAILED
            detail: A valid X-CSRF-Token header matching the csrf cookie is required.
    NotFound:
      description: Resource not found (or not visible to the caller's tenant).
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
          example:
            type: "https://gilgamesh.example/problems/not-found"
            title: Not Found
            status: 404
            code: NOT_FOUND
    NotModified:
      description: Not modified — the client's `If-None-Match` ETag still matches (cached copy is fresh).
    PayloadTooLarge:
      description: Uploaded file exceeds the maximum permitted size.
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
          example:
            type: "https://gilgamesh.example/problems/payload-too-large"
            title: Payload Too Large
            status: 413
            code: FILE_TOO_LARGE
    UnsupportedMediaType:
      description: Uploaded file's MIME type / extension is not in the allowlist (or magic-byte sniff mismatched).
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
          example:
            type: "https://gilgamesh.example/problems/unsupported-media-type"
            title: Unsupported Media Type
            status: 415
            code: UNSUPPORTED_FILE_TYPE
    Conflict:
      description: State or uniqueness conflict.
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
          example:
            type: "https://gilgamesh.example/problems/conflict"
            title: Conflict
            status: 409
            code: CONFLICT
            detail: A resource with that slug already exists in this org.
    UnprocessableEntity:
      description: Validation failed.
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
          example:
            type: "https://gilgamesh.example/problems/validation"
            title: Unprocessable Entity
            status: 422
            code: VALIDATION_FAILED
            errors:
              - field: email
                detail: must be a valid email address
    TooManyRequests:
      description: Rate limit exceeded.
      headers:
        Retry-After: { $ref: '#/components/headers/RetryAfter' }
        X-RateLimit-Limit: { $ref: '#/components/headers/RateLimitLimit' }
        X-RateLimit-Remaining: { $ref: '#/components/headers/RateLimitRemaining' }
        X-RateLimit-Reset: { $ref: '#/components/headers/RateLimitReset' }
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
          example:
            type: "https://gilgamesh.example/problems/rate-limited"
            title: Too Many Requests
            status: 429
            code: RATE_LIMITED
    ProblemDefault:
      description: Unexpected error (RFC 9457 Problem).
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
          example:
            type: about:blank
            title: Internal Server Error
            status: 500
            code: INTERNAL

  schemas:
    # ---------------------------------------------------------------------------------
    # Frozen enums (keystone §1) — verbatim. AgentSlot/AgentFamily/integration keys are
    # stable lowercase; all others SCREAMING_SNAKE.
    # ---------------------------------------------------------------------------------
    Role:
      type: string
      enum: [OWNER, ADMIN, MEMBER, VIEWER]
    ProjectFormat:
      type: string
      enum: [BDD, TRADITIONAL]
    AgentSlot:
      type: string
      description: Stable lowercase agent slot keys (keystone §3).
      enum: [lead, arch, manual, web, api, android, ios, perf, visual, sec, a11y]
    AgentFamily:
      type: string
      description: Stable lowercase agent family keys.
      enum: [proceso, ui, backend, guardian]
    AgentRuntimeStatus:
      type: string
      description: |
        Derived: IDLE if not enabled; BUSY if the agent is in a currently running RunNode; else ACTIVE.
      enum: [ACTIVE, BUSY, IDLE]
    TestCasePriority:
      type: string
      enum: [HIGH, MEDIUM, LOW]
    TestCaseStatus:
      type: string
      enum: [NOTRUN, PASS, FAIL, BLOCKED, SKIPPED]
    RunStatus:
      type: string
      enum: [QUEUED, RUNNING, DONE, FAILED, CANCELED]
    RunMode:
      type: string
      enum: [BDD, STEPS]
    RunTrigger:
      type: string
      enum: [MANUAL, CI, SCHEDULE]
    RunNodeKind:
      type: string
      enum: [DISPATCH, STAGE, CONSOLIDATE]
    RunNodeState:
      type: string
      enum: [IDLE, QUEUED, RUNNING, DONE_PASS, DONE_FAIL]
    ArtifactType:
      type: string
      enum: [VIDEO, SCREENSHOT, HAR, LOG, REPORT_HTML]
    CaptureMode:
      type: string
      enum: ["OFF", "ON_FAIL", "ALWAYS", "ON_DEMAND"]
    IntegrationGroup:
      type: string
      enum: [SOURCE_REPOS, PROJECT_TRACKING, TEST_MANAGEMENT, COMMUNICATION, CICD, DEVICES_BROWSERS]
    Plan:
      type: string
      enum: [FREE, STARTER, GROWTH, SCALE]
    BillingCycle:
      type: string
      enum: [MONTHLY, ANNUAL]
    SubscriptionStatus:
      type: string
      enum: [TRIALING, ACTIVE, PAST_DUE, CANCELED]
    KnowledgeDocStatus:
      type: string
      enum: [UPLOADED, INDEXING, INDEXED, FAILED]
    BrainTier:
      type: string
      description: LLM tier behind the AgentBrainPort (keystone §5). Not exposed on any v1 endpoint.
      enum: [HAIKU, SONNET, OPUS]

    # ---------------------------------------------------------------------------------
    # Entities (keystone §2) — fields verbatim. Server-only secrets
    # (passwordHash, tokenHash, embedding) are intentionally never represented here.
    # ---------------------------------------------------------------------------------
    Org:
      type: object
      description: Root tenant.
      required: [id, name, slug, createdAt, updatedAt]
      properties:
        id: { type: string, format: uuid, description: UUID v7 }
        name: { type: string }
        slug: { type: string, description: Unique org slug. }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    User:
      type: object
      description: Global user (may belong to many orgs). `passwordHash` (Argon2id) is server-only and never serialized.
      required: [id, email, firstName, lastName, status, createdAt, updatedAt]
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email, description: Unique (citext). }
        firstName: { type: string }
        middleName: { type: string }
        lastName: { type: string }
        status: { type: string, enum: [ACTIVE, DISABLED] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    Membership:
      type: object
      description: RBAC join of User ↔ Org. Unique(orgId,userId).
      required: [id, orgId, userId, role, createdAt]
      properties:
        id: { type: string, format: uuid }
        orgId: { type: string, format: uuid }
        userId: { type: string, format: uuid }
        role: { $ref: '#/components/schemas/Role' }
        createdAt: { type: string, format: date-time }

    Session:
      type: object
      description: Local-auth session. `tokenHash` is server-only and never serialized.
      required: [id, userId, expiresAt, createdAt]
      properties:
        id: { type: string, format: uuid }
        userId: { type: string, format: uuid }
        expiresAt: { type: string, format: date-time }
        ip: { type: string }
        userAgent: { type: string }
        createdAt: { type: string, format: date-time }
        revokedAt: { type: string, format: date-time }

    Project:
      type: object
      description: Project under an Org. Unique(orgId,slug).
      required: [id, orgId, name, slug, format, createdAt, updatedAt]
      properties:
        id: { type: string, format: uuid }
        orgId: { type: string, format: uuid }
        name: { type: string }
        slug: { type: string }
        format: { $ref: '#/components/schemas/ProjectFormat' }
        repoProvider: { type: string, enum: [github, gitlab, bitbucket, ado] }
        repoFullName: { type: string, examples: [gsanchezm/omnipizza-web] }
        repoBranch: { type: string }
        repoCommit: { type: string }
        repoLastSyncAt: { type: string, format: date-time }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    Slice:
      type: object
      description: Vertical slice (Checkout/Login/Catalog/Payments/Imported). Unique(projectId,key).
      required: [id, orgId, projectId, key, name, order]
      properties:
        id: { type: string, format: uuid }
        orgId: { type: string, format: uuid }
        projectId: { type: string, format: uuid }
        key: { type: string }
        name: { type: string }
        order: { type: integer }

    Feature:
      type: object
      description: BDD `.feature` file (Gherkin).
      required: [id, orgId, projectId, name, path, content, createdAt, updatedAt]
      properties:
        id: { type: string, format: uuid }
        orgId: { type: string, format: uuid }
        projectId: { type: string, format: uuid }
        sliceId: { type: string, format: uuid }
        name: { type: string }
        path: { type: string }
        content: { type: string, description: Gherkin text. }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    Scenario:
      type: object
      description: A parsed scenario within a Feature.
      required: [id, orgId, featureId, name, order]
      properties:
        id: { type: string, format: uuid }
        orgId: { type: string, format: uuid }
        featureId: { type: string, format: uuid }
        name: { type: string }
        order: { type: integer }
        lastStatus: { $ref: '#/components/schemas/TestCaseStatus' }

    TestCase:
      type: object
      description: Traditional test case (e.g. key TC_CHK_001).
      required: [id, orgId, projectId, key, title, steps, data, expected, priority, status, createdAt, updatedAt]
      properties:
        id: { type: string, format: uuid }
        orgId: { type: string, format: uuid }
        projectId: { type: string, format: uuid }
        sliceId: { type: string, format: uuid }
        key: { type: string, examples: [TC_CHK_001] }
        title: { type: string }
        steps: { type: string }
        data: { type: string }
        expected: { type: string }
        priority: { $ref: '#/components/schemas/TestCasePriority' }
        status: { $ref: '#/components/schemas/TestCaseStatus' }
        assignedAgentId: { type: string, format: uuid }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    Agent:
      type: object
      description: Per-Org agent catalog entry (one of the 11). Unique(orgId,slot). Seeded from roster §3.
      required: [id, orgId, slot, deityName, role, family, glyph, culture, defaultTool, createdAt]
      properties:
        id: { type: string, format: uuid }
        orgId: { type: string, format: uuid }
        slot: { $ref: '#/components/schemas/AgentSlot' }
        deityName: { type: string, examples: [Zeus] }
        role: { type: string, description: "Human label, e.g. QA Lead." }
        family: { $ref: '#/components/schemas/AgentFamily' }
        glyph: { type: string, examples: [ZE] }
        culture: { type: string, examples: [Grecia] }
        defaultTool: { type: string, examples: [Helix Core] }
        createdAt: { type: string, format: date-time }

    ToolBinding:
      type: object
      description: Per-Project agent state + tool selection (Strategy). Unique(projectId,agentId).
      required: [id, orgId, projectId, agentId, tool, enabled, updatedAt]
      properties:
        id: { type: string, format: uuid }
        orgId: { type: string, format: uuid }
        projectId: { type: string, format: uuid }
        agentId: { type: string, format: uuid }
        tool: { type: string, description: Selected tool (∈ the agent's role options). }
        enabled: { type: boolean, description: Awake when true. }
        updatedAt: { type: string, format: date-time }

    Run:
      type: object
      description: A test run over a DAG of stages.
      required: [id, orgId, projectId, status, mode, trigger, selectedStages, progress, runLabel, createdById, createdAt]
      properties:
        id: { type: string, format: uuid }
        orgId: { type: string, format: uuid }
        projectId: { type: string, format: uuid }
        status: { $ref: '#/components/schemas/RunStatus' }
        mode: { $ref: '#/components/schemas/RunMode' }
        trigger: { $ref: '#/components/schemas/RunTrigger' }
        selectedStages: { type: array, items: { type: string } }
        progress: { type: integer, minimum: 0, maximum: 100 }
        runLabel: { type: string, examples: ["local · main · 2026-05-25 19:00:02"] }
        commitSha: { type: string }
        passed: { type: integer }
        failed: { type: integer }
        skipped: { type: integer }
        total: { type: integer }
        ratePct: { type: number }
        durationMs: { type: integer }
        createdById: { type: string, format: uuid }
        startedAt: { type: string, format: date-time }
        finishedAt: { type: string, format: date-time }
        createdAt: { type: string, format: date-time }

    RunNode:
      type: object
      description: A node of the run DAG (dispatch / stage / consolidate).
      required: [id, orgId, runId, key, kind, level, deps, state]
      properties:
        id: { type: string, format: uuid }
        orgId: { type: string, format: uuid }
        runId: { type: string, format: uuid }
        key: { type: string, examples: [__dispatch, checkout.feature, __consolidate] }
        kind: { $ref: '#/components/schemas/RunNodeKind' }
        agentId: { type: string, format: uuid }
        tool: { type: string }
        feature: { type: string }
        sliceId: { type: string, format: uuid }
        level: { type: integer }
        deps: { type: array, items: { type: string } }
        state: { $ref: '#/components/schemas/RunNodeState' }
        passed: { type: integer }
        failed: { type: integer }
        skipped: { type: integer }
        durationMs: { type: integer }
        startedAt: { type: string, format: date-time }
        finishedAt: { type: string, format: date-time }

    Artifact:
      type: object
      description: |
        Run artifact. `storageKey` is the internal blob key (server-only); the API returns it as a
        signed expiring `url` via `ArtifactView`, never the raw key or a public URL.
      required: [id, orgId, runId, type, storageKey, contentType, sizeBytes, capturedAt]
      properties:
        id: { type: string, format: uuid }
        orgId: { type: string, format: uuid }
        runId: { type: string, format: uuid }
        runNodeId: { type: string, format: uuid }
        type: { $ref: '#/components/schemas/ArtifactType' }
        storageKey: { type: string, writeOnly: true, description: Internal blob key; never serialized in responses. }
        contentType: { type: string }
        sizeBytes: { type: integer, format: int64, description: "64-bit (BigInt); videos can exceed 2^31." }
        capturedAt: { type: string, format: date-time }
        meta: { type: object, additionalProperties: true }

    Integration:
      type: object
      description: |
        Per-Org integration connection. `secretRef` (a Key Vault reference — NEVER a raw token) is
        server-only and never serialized.
      required: [id, orgId, key, group, connected, config]
      properties:
        id: { type: string, format: uuid }
        orgId: { type: string, format: uuid }
        key: { type: string, description: Stable integration key (keystone §8). }
        group: { $ref: '#/components/schemas/IntegrationGroup' }
        connected: { type: boolean }
        config:
          type: object
          description: |
            **Non-secret** per-integration settings only (server-validated against a per-`key` allowlist
            of typed keys). Credentials are NEVER placed here — they are accepted only via the write-only
            `secret` field and stored as a Key Vault reference (`secretRef`), which is itself never
            serialized. A token mistakenly placed in `config` would be rejected server-side. (Per-key
            typed schemas with `additionalProperties:false` are the GA hardening for this OUTLINE shape.)
        connectedById: { type: string, format: uuid }
        connectedAt: { type: string, format: date-time }

    Subscription:
      type: object
      description: Org subscription (Stripe or deterministic mock). Unique(orgId).
      required: [id, orgId, plan, billingCycle, seats, status, runMinutesQuota, runMinutesUsed, brainTokensQuota, brainTokensUsed]
      properties:
        id: { type: string, format: uuid }
        orgId: { type: string, format: uuid }
        plan: { $ref: '#/components/schemas/Plan' }
        billingCycle: { $ref: '#/components/schemas/BillingCycle' }
        seats: { type: integer }
        status: { $ref: '#/components/schemas/SubscriptionStatus' }
        runMinutesQuota: { type: integer }
        runMinutesUsed: { type: integer }
        # Slice 14 (keystone v0.6): monthly AI Brain token allowance. Billable = input + output
        # tokens (cache read/create excluded); exhausted -> QUOTA_EXCEEDED 402 (narrated in chat).
        brainTokensQuota: { type: integer }
        brainTokensUsed: { type: integer }
        providerCustomerId: { type: string }
        providerSubscriptionId: { type: string }
        currentPeriodEnd: { type: string, format: date-time }

    KnowledgeDoc:
      type: object
      description: Private RAG source document. `storageKey` is server-only and never serialized.
      required: [id, orgId, name, sizeBytes, status, createdById, createdAt]
      properties:
        id: { type: string, format: uuid }
        orgId: { type: string, format: uuid }
        projectId: { type: string, format: uuid }
        name: { type: string }
        sizeBytes: { type: integer, format: int64, description: "64-bit (BigInt); videos can exceed 2^31." }
        status: { $ref: '#/components/schemas/KnowledgeDocStatus' }
        createdById: { type: string, format: uuid }
        createdAt: { type: string, format: date-time }

    KnowledgeChunk:
      type: object
      description: |
        A tenant-scoped RAG chunk. The 1536-dim `embedding` vector is server-only (pgvector) and never
        serialized.
      required: [id, orgId, docId, ordinal, content]
      properties:
        id: { type: string, format: uuid }
        orgId: { type: string, format: uuid }
        docId: { type: string, format: uuid }
        ordinal: { type: integer }
        content: { type: string }

    AuditLog:
      type: object
      description: Immutable sensitive-action audit entry.
      required: [id, orgId, action, targetType, createdAt]
      properties:
        id: { type: string, format: uuid }
        orgId: { type: string, format: uuid }
        actorUserId: { type: string, format: uuid }
        action: { type: string, examples: [member.role.changed] }
        targetType: { type: string, examples: [Membership] }
        targetId: { type: string }
        metadata: { type: object, additionalProperties: true }
        ip: { type: string }
        createdAt: { type: string, format: date-time }

    # ---------------------------------------------------------------------------------
    # View DTOs (response representations). `XView` = the API-returned shape of entity X.
    # ---------------------------------------------------------------------------------
    OrgView:
      allOf: [ { $ref: '#/components/schemas/Org' } ]
      description: Org response DTO.
    UserView:
      allOf: [ { $ref: '#/components/schemas/User' } ]
      description: User response DTO (never includes passwordHash).
    MembershipView:
      allOf:
        - { $ref: '#/components/schemas/Membership' }
        - type: object
          properties:
            user: { $ref: '#/components/schemas/UserView' }
      description: |
        Membership response DTO, optionally embedding the user. **Perf:** when `listMembers` embeds
        `user` (cursor up to 100), the users MUST be loaded via a **single join / Prisma `include`**, not
        a per-row fetch (no N+1).
    SessionView:
      allOf: [ { $ref: '#/components/schemas/Session' } ]
      description: Session response DTO (never includes tokenHash).
    ProjectView:
      allOf: [ { $ref: '#/components/schemas/Project' } ]
      description: Project response DTO.
    SliceView:
      allOf: [ { $ref: '#/components/schemas/Slice' } ]
      description: Slice response DTO.
    FeatureView:
      allOf:
        - { $ref: '#/components/schemas/Feature' }
        - type: object
          properties:
            scenarios: { type: array, items: { $ref: '#/components/schemas/ScenarioView' } }
      description: Feature response DTO, optionally including parsed scenarios.
    ScenarioView:
      allOf: [ { $ref: '#/components/schemas/Scenario' } ]
      description: Scenario response DTO.
    TestCaseView:
      allOf: [ { $ref: '#/components/schemas/TestCase' } ]
      description: Test case response DTO.
    AgentView:
      allOf:
        - { $ref: '#/components/schemas/Agent' }
        - type: object
          required: [toolOptions]
          properties:
            toolOptions:
              type: array
              items: { type: string }
              description: Per-role tool options (keystone §3); first element is the default tool.
      description: Agent catalog response DTO (entity + available tool options).
    ToolBindingView:
      allOf: [ { $ref: '#/components/schemas/ToolBinding' } ]
      description: ToolBinding response DTO.
    ProjectAgentView:
      type: object
      description: |
        Composite project-agent view = catalog `Agent` + its per-Project `ToolBinding` + derived
        `runtimeStatus`. Drives the Agent room and the Strategy tool selector.
      required: [agent, runtimeStatus]
      properties:
        agent: { $ref: '#/components/schemas/AgentView' }
        toolBinding:
          oneOf:
            - { $ref: '#/components/schemas/ToolBindingView' }
            - { type: 'null' }
          description: Null until a binding is first created for this project.
        runtimeStatus: { $ref: '#/components/schemas/AgentRuntimeStatus' }
    RunView:
      allOf:
        - { $ref: '#/components/schemas/Run' }
        - type: object
          properties:
            nodes: { type: array, items: { $ref: '#/components/schemas/RunNodeView' } }
      description: Run response DTO, optionally including the resolved DAG nodes.
    RunNodeView:
      allOf: [ { $ref: '#/components/schemas/RunNode' } ]
      description: |
        Run node response DTO. Exposes `agentId` only (keystone §2 `RunNode` has no denormalized display
        fields). The DAG canvas (design-system §9.7) resolves `deityName`/`glyph`/`family` per node from
        the **client-cached agent catalog** (`GET /orgs/{orgId}/agents`, ETag-cached — see perf note on
        the catalog GETs), not a per-node lookup — so rendering a DAG is O(1) catalog reads, not N.
    ArtifactView:
      type: object
      description: Artifact response DTO — metadata plus a signed, expiring URL (no raw storageKey).
      required: [id, runId, type, contentType, sizeBytes, capturedAt, url, urlExpiresAt]
      properties:
        id: { type: string, format: uuid }
        runId: { type: string, format: uuid }
        runNodeId: { type: string, format: uuid }
        type: { $ref: '#/components/schemas/ArtifactType' }
        contentType: { type: string }
        sizeBytes: { type: integer, format: int64, description: "64-bit (BigInt); videos can exceed 2^31." }
        capturedAt: { type: string, format: date-time }
        meta: { type: object, additionalProperties: true }
        url: { type: string, format: uri, description: Short-lived signed URL. }
        urlExpiresAt: { type: string, format: date-time }
    IntegrationView:
      allOf: [ { $ref: '#/components/schemas/Integration' } ]
      description: Integration response DTO (never includes secretRef).
    SubscriptionView:
      allOf: [ { $ref: '#/components/schemas/Subscription' } ]
      description: Subscription response DTO.
    KnowledgeDocView:
      allOf: [ { $ref: '#/components/schemas/KnowledgeDoc' } ]
      description: Knowledge document response DTO (never includes storageKey).
    KnowledgeChunkView:
      allOf: [ { $ref: '#/components/schemas/KnowledgeChunk' } ]
      description: Knowledge chunk response DTO (never includes embedding).
    AuditLogView:
      allOf: [ { $ref: '#/components/schemas/AuditLog' } ]
      description: Audit entry response DTO.

    # ---------------------------------------------------------------------------------
    # Create DTOs (request bodies). orgId/id/createdAt/updatedAt are NEVER accepted —
    # tenant + identity + timestamps are server-assigned.
    # ---------------------------------------------------------------------------------
    UserCreate:
      type: object
      additionalProperties: false
      required: [email, password, firstName, lastName]
      properties:
        email: { type: string, format: email }
        password: { type: string, format: password, writeOnly: true, minLength: 12 }
        firstName: { type: string }
        middleName: { type: string }
        lastName: { type: string }
    # Auth request DTOs — local email/password bodies with no *Create/*Update/*View analogue.
    # Introduced as named request schemas (deviations from the keystone DTO naming convention) so
    # generated clients get stable types; documented in slice-1 spec §13.
    LoginRequest:
      type: object
      additionalProperties: false
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, format: password, writeOnly: true }
        remember:
          type: boolean
          default: false
          description: When true, session/cookie lifetime is extended.
    ForgotPasswordRequest:
      type: object
      additionalProperties: false
      required: [email]
      properties:
        email: { type: string, format: email }
    ResetPasswordRequest:
      type: object
      additionalProperties: false
      required: [token, newPassword]
      properties:
        token:
          type: string
          minLength: 32
          description: |
            Single-use reset token from the email link. **Normative entropy: ≥ 128 bits** of CSPRNG
            randomness. Stored server-side **only as a hash**, with a **short expiry (≤ 30 min)**, and
            invalidated on first use (single-use). The example value is illustrative, not a fixed format.
        newPassword: { type: string, format: password, writeOnly: true, minLength: 12 }
    OrgCreate:
      type: object
      additionalProperties: false
      required: [name]
      properties:
        name: { type: string }
        slug: { type: string, description: Optional; derived from name if omitted. }
    MembershipCreate:
      type: object
      additionalProperties: false
      required: [email, role]
      properties:
        email: { type: string, format: email, description: Existing user is added; otherwise invited. }
        role: { $ref: '#/components/schemas/Role' }
    ProjectCreate:
      type: object
      additionalProperties: false
      description: Onboarding payload (3-step wizard). Repo fields are optional.
      required: [name, format]
      properties:
        name: { type: string }
        slug: { type: string, description: Optional; derived from name if omitted. }
        format: { $ref: '#/components/schemas/ProjectFormat' }
        repoProvider: { type: string, enum: [github, gitlab, bitbucket, ado] }
        repoFullName: { type: string }
        repoBranch: { type: string }
    SliceCreate:
      type: object
      additionalProperties: false
      required: [key, name]
      properties:
        key: { type: string }
        name: { type: string }
        order: { type: integer }
    FeatureCreate:
      type: object
      additionalProperties: false
      required: [name, path, content]
      properties:
        sliceId: { type: string, format: uuid }
        name: { type: string }
        path: { type: string }
        content: { type: string }
    TestCaseCreate:
      type: object
      additionalProperties: false
      required: [key, title, steps, data, expected, priority]
      properties:
        sliceId: { type: string, format: uuid }
        key: { type: string }
        title: { type: string }
        steps: { type: string }
        data: { type: string }
        expected: { type: string }
        priority: { $ref: '#/components/schemas/TestCasePriority' }
        assignedAgentId: { type: string, format: uuid }
    RunCreate:
      type: object
      additionalProperties: false
      description: Run enqueue payload. The server resolves the DAG from `selectedStages`.
      required: [mode, selectedStages]
      properties:
        mode: { $ref: '#/components/schemas/RunMode' }
        trigger:
          allOf: [ { $ref: '#/components/schemas/RunTrigger' } ]
          default: MANUAL
        selectedStages:
          type: array
          minItems: 1
          items: { type: string }
          description: Toggled stage keys from the Orchestration canvas.
        runLabel: { type: string }
        commitSha: { type: string }

    # ---------------------------------------------------------------------------------
    # Update DTOs (PATCH bodies — partial; all properties optional).
    # ---------------------------------------------------------------------------------
    OrgUpdate:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        name: { type: string }
        slug: { type: string }
    UserUpdate:
      type: object
      additionalProperties: false
      minProperties: 1
      description: |
        Self-service profile fields only. The privileged `status` (ACTIVE|DISABLED) is **intentionally
        excluded** to prevent mass-assignment self-enable/disable — flipping a user's `status` is an
        admin-only, audited operation on a separate endpoint, never a self-PATCH.
      properties:
        firstName: { type: string }
        middleName: { type: string }
        lastName: { type: string }
    MembershipUpdate:
      type: object
      additionalProperties: false
      required: [role]
      properties:
        role: { $ref: '#/components/schemas/Role' }
    ProjectUpdate:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        name: { type: string }
        format: { $ref: '#/components/schemas/ProjectFormat' }
        repoProvider: { type: string, enum: [github, gitlab, bitbucket, ado] }
        repoFullName: { type: string }
        repoBranch: { type: string }
        repoCommit: { type: string }
    SliceUpdate:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        name: { type: string }
        order: { type: integer }
    FeatureUpdate:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        sliceId: { type: string, format: uuid }
        name: { type: string }
        path: { type: string }
        content: { type: string }
    TestCaseUpdate:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        sliceId: { type: string, format: uuid }
        key: { type: string }
        title: { type: string }
        steps: { type: string }
        data: { type: string }
        expected: { type: string }
        priority: { $ref: '#/components/schemas/TestCasePriority' }
        status: { $ref: '#/components/schemas/TestCaseStatus' }
        assignedAgentId: { type: string, format: uuid }
    ToolBindingUpdate:
      type: object
      additionalProperties: false
      minProperties: 1
      description: PATCH a project agent — select tool and/or toggle awake.
      properties:
        tool: { type: string, description: Must be one of the agent's role tool options. }
        enabled: { type: boolean }
    IntegrationUpdate:
      type: object
      additionalProperties: false
      minProperties: 1
      description: Connect/disconnect/configure. `secret` is write-only and stored as a Key Vault ref.
      properties:
        connected: { type: boolean }
        config:
          type: object
          description: "Non-secret per-`key` settings only (server-validated allowlist). Never put credentials here — use `secret`."
        secret: { type: string, writeOnly: true, description: "Raw token; vaulted server-side as `secretRef`, never echoed or placed in `config`." }

    # ---------------------------------------------------------------------------------
    # Run event (keystone §5) — SSE payload, oneOf discriminated by `type`.
    # ---------------------------------------------------------------------------------
    RunEvent:
      oneOf:
        - { $ref: '#/components/schemas/RunEventNodeState' }
        - { $ref: '#/components/schemas/RunEventLog' }
        - { $ref: '#/components/schemas/RunEventArtifact' }
        - { $ref: '#/components/schemas/RunEventSummary' }
      discriminator:
        propertyName: type
        mapping:
          NODE_STATE: '#/components/schemas/RunEventNodeState'
          LOG: '#/components/schemas/RunEventLog'
          ARTIFACT: '#/components/schemas/RunEventArtifact'
          SUMMARY: '#/components/schemas/RunEventSummary'
    RunEventNodeState:
      type: object
      additionalProperties: false
      required: [type, nodeKey, state, at]
      properties:
        type: { type: string, const: NODE_STATE }
        nodeKey: { type: string }
        state: { $ref: '#/components/schemas/RunNodeState' }
        at: { type: string, format: date-time }
    RunEventLog:
      type: object
      additionalProperties: false
      required: [type, level, text, at]
      properties:
        type: { type: string, const: LOG }
        nodeKey: { type: string }
        level: { type: string, enum: [sys, run, pass, fail, log] }
        text: { type: string }
        at: { type: string, format: date-time }
    RunEventArtifact:
      type: object
      additionalProperties: false
      description: |
        SSE wire form of the `ARTIFACT` event. **Divergence from keystone §5 (intentional, documented in
        run-lifecycle.md §5/§10):** the kernel-internal `RunEvent.ARTIFACT` carries the raw `storageKey`
        (the kernel just wrote the blob), but the API SSE relay MUST NOT serialize internal storage paths
        to the browser (README "storageKey is never serialized in any response"). The relay therefore
        emits the **persisted `Artifact.id` (`artifactId`)** instead; the client mints a signed URL on
        demand via `GET /artifacts/{id}`. The keystone port event is left frozen; only this wire DTO and
        the run-lifecycle relay change.
      required: [type, nodeKey, artifact]
      properties:
        type: { type: string, const: ARTIFACT }
        nodeKey: { type: string }
        artifact:
          type: object
          additionalProperties: false
          required: [type, artifactId, contentType, sizeBytes]
          properties:
            type: { $ref: '#/components/schemas/ArtifactType' }
            artifactId: { type: string, format: uuid, description: "Persisted Artifact.id; resolve the blob via GET /artifacts/{id} (signed URL). The raw storageKey is never sent over SSE." }
            contentType: { type: string }
            sizeBytes: { type: integer, format: int64, description: "64-bit (BigInt); videos can exceed 2^31." }
    RunEventSummary:
      type: object
      additionalProperties: false
      required: [type, passed, failed, skipped, total, ratePct, durationMs]
      properties:
        type: { type: string, const: SUMMARY }
        passed: { type: integer }
        failed: { type: integer }
        skipped: { type: integer }
        total: { type: integer }
        ratePct: { type: number }
        durationMs: { type: integer }

    # ---------------------------------------------------------------------------------
    # Report (layered) — keystone §6 / prototype §7.
    # ---------------------------------------------------------------------------------
    ReportView:
      type: object
      description: Layered run report — summary, per-tool cards, and per-tool drill-down.
      required: [runId, runLabel, summary, tools]
      properties:
        runId: { type: string, format: uuid }
        runLabel: { type: string }
        commitSha: { type: string }
        summary:
          type: object
          required: [passed, failed, skipped, total, ratePct, durationMs]
          properties:
            passed: { type: integer }
            failed: { type: integer }
            skipped: { type: integer }
            total: { type: integer }
            ratePct: { type: number }
            durationMs: { type: integer }
        tools:
          type: array
          description: "One card per tool that ran (or noData=true if nothing was ingested)."
          items:
            type: object
            required: [tool, kind, noData]
            properties:
              tool: { type: string }
              slot: { $ref: '#/components/schemas/AgentSlot' }
              kind: { type: string, enum: [CASE, PERF, VISUAL, SEC, A11Y, API], description: "Report-card category. Non-CASE values are the SCREAMING_SNAKE form of the parallel AgentSlot key (perf/visual/sec/a11y/api)." }
              ran: { type: integer }
              passed: { type: integer }
              failed: { type: integer }
              skipped: { type: integer }
              ratePct: { type: number }
              noData: { type: boolean }
              cases:
                type: array
                description: |
                  Bounded **first page** of the CASE-kind drill-down. The full list is paginated via
                  `GET /runs/{id}/report/tools/{tool}/cases` so this payload never grows unbounded.
                items: { $ref: '#/components/schemas/ReportCase' }
              perf:
                type: object
                description: Present for PERF-kind tools (gauges + per-scenario latency).
                properties:
                  throughputRps: { type: number }
                  avgMs: { type: number }
                  p95Ms: { type: number }
                  errorPct: { type: number }
                  scenarios:
                    type: array
                    items:
                      type: object
                      properties:
                        name: { type: string }
                        rps: { type: number }
                        p95Ms: { type: number }
                        errorPct: { type: number }
    ReportCase:
      type: object
      description: |
        One CASE-kind drill-down row. Used both inline (bounded first page in `ReportView.tools[].cases`)
        and as the item of the paginated `GET /runs/{id}/report/tools/{tool}/cases`. Media is referenced
        by `artifactId` only — signed URLs are minted lazily by the viewer, never pre-signed per case.
      required: [testCaseId, key, status]
      properties:
        testCaseId: { type: string, format: uuid }
        key: { type: string }
        title: { type: string }
        status: { $ref: '#/components/schemas/TestCaseStatus' }
        durationMs: { type: integer }
        media:
          type: array
          items:
            type: object
            required: [type]
            properties:
              type: { $ref: '#/components/schemas/ArtifactType' }
              artifactId: { type: string, format: uuid, description: "Fetch the blob via GET /artifacts/{id}." }
              capture: { $ref: '#/components/schemas/CaptureMode' }

    # ---------------------------------------------------------------------------------
    # Session context (/auth/me, login, register).
    # ---------------------------------------------------------------------------------
    MeView:
      type: object
      description: |
        Current session context — the authenticated user, memberships, and active org. **Perf
        (`GET /auth/me` is an 80 ms hot path):** the `memberships[].org` embed MUST be resolved as a
        **single Prisma `include`** (one query, not one per membership — no N+1); the reverse lookup
        "which orgs does this user belong to?" is already index-backed by `Membership(userId)`
        (schema.prisma `@@index([userId])`).
      required: [user, memberships]
      properties:
        user: { $ref: '#/components/schemas/UserView' }
        memberships:
          type: array
          items:
            type: object
            required: [org, role]
            properties:
              org: { $ref: '#/components/schemas/OrgView' }
              role: { $ref: '#/components/schemas/Role' }
        activeOrgId:
          oneOf:
            - { type: string, format: uuid }
            - { type: 'null' }
          description: The org the session is currently scoped to (null right after register).

    # ---------------------------------------------------------------------------------
    # Pagination + errors.
    # ---------------------------------------------------------------------------------
    PageMeta:
      type: object
      description: Cursor-pagination metadata.
      required: [hasMore, limit]
      properties:
        nextCursor:
          oneOf:
            - { type: string }
            - { type: 'null' }
          description: Opaque cursor for the next page, or null if none.
        hasMore: { type: boolean }
        limit: { type: integer }

    Problem:
      type: object
      description: RFC 9457 problem details (`application/problem+json`).
      required: [title, status]
      properties:
        type: { type: string, format: uri, default: about:blank, description: A URI identifying the problem type. }
        title: { type: string }
        status: { type: integer }
        detail: { type: string }
        instance: { type: string, format: uri }
        code: { type: string, description: Stable machine-readable error code. }
        errors:
          type: array
          description: Field-level validation errors (extension member).
          items:
            type: object
            properties:
              field: { type: string }
              detail: { type: string }
