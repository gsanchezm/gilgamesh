        '404': { $ref: '#/components/responses/NotFound' }
        default: { $ref: '#/components/responses/ProblemDefault' }
    post:
      tags: [runs]
      operationId: enqueueRun
      summary: Enqueue a run
      description: |
        Enqueues a run for the selected stages. The server resolves the DAG (`__dispatch` → stage
        nodes by deps → `__consolidate`) via the `TestKernel` port and executes asynchronously; watch
        progress on `GET /runs/{id}/events`. `selectedStages` are the toggled stage keys from the
        Orchestration canvas. RBAC: MEMBER+. Performance budget: returns `202` in ≤ 300 ms.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RunCreate' }
            example:
              mode: BDD
              trigger: MANUAL
              selectedStages: [checkout.feature, payments.api, home.visual, load-500vu, android.smoke]
              runLabel: "local · main · 2026-05-25 19:00:02"
              commitSha: a1b2c3d
      responses:
        '202':
          description: Run accepted and queued.
          headers:
            Location:
              description: URL of the created run.
              schema: { type: string, format: uri }
            X-RateLimit-Limit: { $ref: '#/components/headers/RateLimitLimit' }
            X-RateLimit-Remaining: { $ref: '#/components/headers/RateLimitRemaining' }
            X-RateLimit-Reset: { $ref: '#/components/headers/RateLimitReset' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RunView' }
              example:
                id: 0190f400-7777-7888-8999-aaaabbbbcccc
                orgId: 0190f3a2-aaaa-7bbb-8ccc-001122334455
                projectId: 0190f3b0-1111-7222-8333-444455556666
                status: QUEUED
                mode: BDD
                trigger: MANUAL
                selectedStages: [checkout.feature, payments.api, home.visual, load-500vu, android.smoke]
                progress: 0
                runLabel: "local · main · 2026-05-25 19:00:02"
                commitSha: a1b2c3d
                createdById: 0190f3a1-1c2d-7e4f-8a9b-1122334455aa
                createdAt: "2026-05-25T19:00:02Z"
        '402':
          description: Run-minutes quota exhausted (Subscription).
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }
        default: { $ref: '#/components/responses/ProblemDefault' }

  /runs/{id}:
    parameters:
      - $ref: '#/components/parameters/PathId'
    get:
      tags: [runs]
