    delete:
      tags: [projects]
      operationId: deleteProject
      summary: Delete a project
      description: |
        **RBAC: OWNER.** **Hard-deletes** the project and **cascades** its slices, features, scenarios,
        test-cases, tool-bindings, and runs (run-nodes, artifacts) — the data model has no `deletedAt`
        on any entity, so every delete is a hard delete + cascade (data-model §8, schema.prisma). Because
        this destroys run- and audit-relevant history, run/audit records MUST be exported before purge;
        the action is audited.
