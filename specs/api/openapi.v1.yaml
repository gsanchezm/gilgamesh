        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        default: { $ref: '#/components/responses/ProblemDefault' }

  # =====================================================================================
  # AGENTS  (FULL DETAIL)
  # =====================================================================================
  /orgs/{orgId}/agents:
    parameters:
      - $ref: '#/components/parameters/OrgId'
    get:
      tags: [agents]
      operationId: listOrgAgents
      summary: Org agent catalog (the 11)
      description: |
        Returns the per-Org agent catalog seeded from the canonical roster (keystone §3): 11 agents,
        unique by `slot`. Each item includes the per-role tool options (`toolOptions`, first = default).
        This catalog is effectively static (it changes only on Org seeding), so the response carries an
        `ETag` + `Cache-Control`; clients SHOULD cache it (e.g. React Query/SWR keyed on `orgId`) and
        re-validate with `If-None-Match` rather than refetching on every Agent-room mount (`304`).
      parameters:
        - $ref: '#/components/parameters/IfNoneMatch'
      responses:
        '200':
          description: The 11 agents.
          headers:
            ETag: { $ref: '#/components/headers/ETag' }
            Cache-Control: { $ref: '#/components/headers/CacheControl' }
            X-RateLimit-Limit: { $ref: '#/components/headers/RateLimitLimit' }
            X-RateLimit-Remaining: { $ref: '#/components/headers/RateLimitRemaining' }
            X-RateLimit-Reset: { $ref: '#/components/headers/RateLimitReset' }
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/AgentView' }
              example:
                data:
                  - id: 0190f3c0-0001-7000-8000-000000000001
                    orgId: 0190f3a2-aaaa-7bbb-8ccc-001122334455
                    slot: lead
                    deityName: Zeus
                    role: QA Lead
                    family: proceso
                    glyph: ZE
                    culture: Grecia
                    defaultTool: Helix Core
                    toolOptions: [Helix Core]
                    createdAt: "2026-06-01T09:05:00Z"
                  - id: 0190f3c0-0001-7000-8000-000000000004
                    orgId: 0190f3a2-aaaa-7bbb-8ccc-001122334455
                    slot: web
                    deityName: Quetzalcóatl
                    role: Web
                    family: ui
                    glyph: QC
                    culture: Azteca
                    defaultTool: Playwright
                    toolOptions: [Playwright, Cypress]
                    createdAt: "2026-06-01T09:05:00Z"
        '304': { $ref: '#/components/responses/NotModified' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        default: { $ref: '#/components/responses/ProblemDefault' }

  /projects/{id}/agents:
    parameters:
      - $ref: '#/components/parameters/PathId'
    get:
      tags: [agents]
      operationId: listProjectAgents
      summary: Project agents (catalog + tool binding + runtime status)
      description: |
        Returns each of the 11 agents joined with its per-Project `ToolBinding` (selected tool +
        enabled/awake) and a derived `runtimeStatus` (IDLE if !enabled; BUSY if currently in a running
        RunNode; else ACTIVE). Resolved in **one** query (join, no N+1). Drives the Agent room.
        Changes only on wake/sleep/tool-select, so the response carries an `ETag` + `Cache-Control`;
        clients SHOULD cache it and re-validate with `If-None-Match` (`304`) rather than refetch on
        every mount.
      parameters:
        - $ref: '#/components/parameters/IfNoneMatch'
      responses:
        '200':
          description: Project agents.
          headers:
            ETag: { $ref: '#/components/headers/ETag' }
            Cache-Control: { $ref: '#/components/headers/CacheControl' }
            X-RateLimit-Limit: { $ref: '#/components/headers/RateLimitLimit' }
            X-RateLimit-Remaining: { $ref: '#/components/headers/RateLimitRemaining' }
            X-RateLimit-Reset: { $ref: '#/components/headers/RateLimitReset' }
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/ProjectAgentView' }
              example:
                data:
                  - agent:
                      id: 0190f3c0-0001-7000-8000-000000000004
                      orgId: 0190f3a2-aaaa-7bbb-8ccc-001122334455
                      slot: web
                      deityName: Quetzalcóatl
                      role: Web
                      family: ui
                      glyph: QC
                      culture: Azteca
                      defaultTool: Playwright
                      toolOptions: [Playwright, Cypress]
                      createdAt: "2026-06-01T09:05:00Z"
                    toolBinding:
                      id: 0190f3d0-0001-7000-8000-000000000004
                      orgId: 0190f3a2-aaaa-7bbb-8ccc-001122334455
                      projectId: 0190f3b0-1111-7222-8333-444455556666
                      agentId: 0190f3c0-0001-7000-8000-000000000004
                      tool: Playwright
                      enabled: true
                      updatedAt: "2026-06-25T19:00:02Z"
                    runtimeStatus: ACTIVE
        '304': { $ref: '#/components/responses/NotModified' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        default: { $ref: '#/components/responses/ProblemDefault' }

