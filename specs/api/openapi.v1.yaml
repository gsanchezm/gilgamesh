openapi: 3.1.0
info:
  title: Gilgamesh Platform API
  version: 1.0.0
  summary: Multi-tenant QA platform API — agents plan, author and run tests.
  description: |
    Gilgamesh v1 HTTP contract. Multi-tenant QA platform where 11 deity-agents plan, author and
    run tests, collaborate on a DAG orchestration canvas, and keep results in-app.

    This document is the **API contract** expansion of the Foundation Keystone
    (`specs/_keystone/foundation-vocabulary.md`). Entity names, field names, enum values, agent
    slot ids and resource paths are taken **verbatim** from the keystone (§1, §2, §3, §5, §6).

    ## Conventions (apply to EVERY operation)
    - **Base path**: all paths below are relative to the server URL `/api/v1`.
    - **Tenant isolation (primordial)**: every request resolves the tenant from the authenticated
      session → `orgId`. Every list/detail query is filtered by that `orgId` (row-level isolation).
      `orgId` is **never** accepted in a request body — a client-supplied `orgId` would be a
      cross-tenant injection vector. For `/orgs/{orgId}/...` paths the path `orgId` is additionally
      checked against the caller's memberships. A **non-member** receives `404` (the resource's
      existence is not leaked); a member with an **insufficient role** receives `403`.
    - **Auth**: a `__Host-`-prefixed, httpOnly + Secure + SameSite=Lax session cookie
      (`__Host-gg_session`). The `__Host-` prefix structurally forces `Secure`, `Path=/`, and **no**
      `Domain` attribute. See `securitySchemes`. All operations require it except
      `/auth/{register,login,forgot-password,reset-password}`.
    - **CSRF (cookie auth)**: every **unsafe** method (`POST`/`PATCH`/`PUT`/`DELETE`) MUST carry a
      double-submit CSRF token — the `X-CSRF-Token` request header (`csrfToken` security scheme) whose
      value must equal a non-HttpOnly `csrf` cookie. `SameSite=Lax` is **not** relied on as the sole
      control (ASVS L2 V4.2). A missing/mismatched token → `403` (`code: CSRF_FAILED`). Safe methods
      (`GET`/`HEAD`) require no token.
    - **CORS**: browser clients (`apps/web`, `apps/mobile`) are served from an explicit **origin
      allowlist** pinned in `api/README.md`. The server returns `Access-Control-Allow-Credentials: true`
      **only** for those exact origins and **never** `Access-Control-Allow-Origin: *` together with
      credentials. Enforced by the DAST gate (CORS allowlist).
    - **RBAC**: each write operation documents the minimum `Role` (OWNER | ADMIN | MEMBER | VIEWER).
      Insufficient role → `403` Problem.
    - **Errors**: RFC 9457 `application/problem+json` (`Problem` schema) for every non-2xx.
    - **Pagination**: cursor-based. List endpoints accept `cursor` + `limit` and return
      `{ data: [...], page: PageMeta }`.
    - **Rate limiting**: every response carries `X-RateLimit-Limit`, `X-RateLimit-Remaining`,
      `X-RateLimit-Reset`; `429` additionally carries `Retry-After`.
    - **Versioning**: breaking changes ship under a new base path (`/api/v2`); v1 is additive-only.
    - **IDs**: UUID v7 strings. **Timestamps**: RFC 3339 UTC.
    - **Artifacts**: blobs are never public; `GET /artifacts/{id}` returns a short-lived **signed URL**.

    ## Performance budgets (first-class; enforced in CI)
    - Read (GET detail) p95 ≤ 200 ms server time; list p95 ≤ 400 ms (page ≤ 50).
    - Write (POST/PATCH) p95 ≤ 500 ms (excludes enqueued async work).
    - `POST /projects/{id}/runs` returns `202` in ≤ 300 ms (enqueue only; execution is async).
    - SSE (canonical set — single source is `run-lifecycle.md` §7, referenced identically by `ci §5.1`):
      **connect** (request → first byte/snapshot) p95 ≤ 200 ms; **event fan-out** (kernel emit → SSE
      client byte) p95 ≤ 250 ms; **time-to-first-event** (enqueue → first `NODE_STATE`) p95 ≤ 1.5 s;
      heartbeat ≤ every 15 s.
  contact:
    name: Gilgamesh Platform
    email: gilberto.aspros@gmail.com
  license:
    name: Proprietary
    url: https://example.invalid/license
servers:
  - url: /api/v1
    description: Versioned base path. All operation paths are relative to this URL.
tags:
  - name: auth
    description: Local email/password auth + session lifecycle (slice 1). Swappable to OIDC later.
  - name: orgs
    description: Organizations (root tenant) and their lifecycle.
  - name: members
    description: "Org membership (RBAC join: User ↔ Org with Role)."
  - name: projects
    description: Projects under an Org. `POST /projects` is the 3-step onboarding action.
  - name: agents
    description: Per-Org agent catalog (the 11) + per-Project tool bindings & runtime status.
  - name: slices
    description: Vertical slices grouping features/cases. (OUTLINE)
  - name: features
    description: BDD `.feature` files (Gherkin) and parsed scenarios. (OUTLINE)
  - name: test-cases
    description: Traditional test cases, with import & AI-generate actions. (OUTLINE)
  - name: runs
    description: Run enqueue, status, live event stream (SSE), cancel, and DAG nodes.
  - name: reports
    description: Layered run reports.
  - name: artifacts
    description: Signed, expiring URLs to run artifacts (video/screenshot/HAR/log/report).
  - name: integrations
    description: Per-Org integration connections (repos, tracking, CI, comms…). (OUTLINE)
  - name: knowledge
    description: Private RAG knowledge documents. (OUTLINE)
  - name: subscription
    description: Plan / seats / quota (mock billing behind PaymentProvider port). (OUTLINE)
  - name: audit
    description: Sensitive-action audit log (read-only). (OUTLINE)
security:
  - sessionCookie: []

paths:
  # =====================================================================================
  # AUTH  (FULL DETAIL)
  # =====================================================================================
  /auth/register:
    post:
      tags: [auth]
      operationId: authRegister
      summary: Register a new user (and start a session)
      description: |
        Creates a global `User` (Argon2id password hash, server-side) and issues a session cookie.
        Does **not** create an Org — onboarding (`POST /projects`) creates the first Org+Project.
        Public endpoint (no session required). Rate-limited; repeated attempts → `429`.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreate'
            example:
              email: gilberto.aspros@gmail.com
              password: "S3cure-Passw0rd!"
              firstName: Gilberto
              lastName: Aspros
      responses:
        '201':
          description: User created; session cookie set.
          headers:
            Set-Cookie:
              description: |
                `__Host-gg_session=<opaque>; HttpOnly; Secure; SameSite=Lax; Path=/; Max-Age=1209600`.
                A non-HttpOnly `csrf=<token>; Secure; SameSite=Lax; Path=/` cookie is set alongside it
                for the double-submit CSRF check.
              schema: { type: string }
            X-RateLimit-Limit: { $ref: '#/components/headers/RateLimitLimit' }
            X-RateLimit-Remaining: { $ref: '#/components/headers/RateLimitRemaining' }
            X-RateLimit-Reset: { $ref: '#/components/headers/RateLimitReset' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MeView' }
              example:
                user:
                  id: 0190f3a1-1c2d-7e4f-8a9b-1122334455aa
                  email: gilberto.aspros@gmail.com
                  firstName: Gilberto
                  lastName: Aspros
                  status: ACTIVE
                  createdAt: "2026-06-29T10:00:00Z"
                  updatedAt: "2026-06-29T10:00:00Z"
                memberships: []
                activeOrgId: null
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
        default: { $ref: '#/components/responses/ProblemDefault' }

  /auth/login:
    post:
      tags: [auth]
      operationId: authLogin
      summary: Log in with email + password
      description: |
        Verifies credentials and issues a session cookie. Public endpoint. On success the session
        binds the caller's **active org** (the most recently used membership, if any). Failures are
        rate-limited and return a generic `401` (no account-existence disclosure).
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
            example:
              email: gilberto.aspros@gmail.com
              password: "S3cure-Passw0rd!"
              remember: true
      responses:
        '200':
          description: Authenticated; session cookie set.
          headers:
            Set-Cookie:
              description: "`__Host-gg_session=<opaque>; HttpOnly; Secure; SameSite=Lax; Path=/` (+ a non-HttpOnly `csrf` cookie for double-submit CSRF)."
              schema: { type: string }
            X-RateLimit-Limit: { $ref: '#/components/headers/RateLimitLimit' }
            X-RateLimit-Remaining: { $ref: '#/components/headers/RateLimitRemaining' }
            X-RateLimit-Reset: { $ref: '#/components/headers/RateLimitReset' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MeView' }
              example:
                user:
                  id: 0190f3a1-1c2d-7e4f-8a9b-1122334455aa
                  email: gilberto.aspros@gmail.com
                  firstName: Gilberto
                  lastName: Aspros
                  status: ACTIVE
                  createdAt: "2026-06-29T10:00:00Z"
                  updatedAt: "2026-06-29T10:00:00Z"
                memberships:
                  - org: { id: 0190f3a2-aaaa-7bbb-8ccc-001122334455, name: OmniPizza Inc, slug: omnipizza, createdAt: "2026-06-01T09:00:00Z", updatedAt: "2026-06-01T09:00:00Z" }
                    role: OWNER
                activeOrgId: 0190f3a2-aaaa-7bbb-8ccc-001122334455
        '401': { $ref: '#/components/responses/Unauthorized' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
        default: { $ref: '#/components/responses/ProblemDefault' }

  /auth/logout:
    post:
      tags: [auth]
      operationId: authLogout
      summary: Log out (revoke current session)
      description: Revokes the current `Session` and clears the cookie. Idempotent. Requires the CSRF token.
      security:
        - sessionCookie: []
          csrfToken: []
      responses:
        '204':
          description: Session revoked; cookie cleared.
          headers:
            Set-Cookie:
              description: "`__Host-gg_session=; Path=/; Secure; Max-Age=0` (cleared); the `csrf` cookie is cleared too."
              schema: { type: string }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/CsrfFailed' }
        default: { $ref: '#/components/responses/ProblemDefault' }

  /auth/me:
    get:
      tags: [auth]
      operationId: authMe
      summary: Current user, memberships, and active org
      description: Returns the authenticated user, all memberships (org + role), and the active org.
      responses:
        '200':
          description: Current session context.
          headers:
            X-RateLimit-Limit: { $ref: '#/components/headers/RateLimitLimit' }
            X-RateLimit-Remaining: { $ref: '#/components/headers/RateLimitRemaining' }
            X-RateLimit-Reset: { $ref: '#/components/headers/RateLimitReset' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MeView' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        default: { $ref: '#/components/responses/ProblemDefault' }

  /auth/forgot-password:
    post:
      tags: [auth]
      operationId: authForgotPassword
      summary: Request a password-reset token
      description: |
        Always returns `202` regardless of whether the email exists (prevents account enumeration).
        If the account exists, a single-use, time-limited reset token is emailed.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ForgotPasswordRequest' }
            example: { email: gilberto.aspros@gmail.com }
      responses:
        '202':
          description: Accepted. If the account exists, a reset email is sent. No body.
        '429': { $ref: '#/components/responses/TooManyRequests' }
        default: { $ref: '#/components/responses/ProblemDefault' }

  /auth/reset-password:
    post:
      tags: [auth]
      operationId: authResetPassword
      summary: Reset password using a token
      description: |
        Consumes a single-use reset token and sets a new Argon2id password hash, then revokes **all** of
        the user's sessions. Subject to a **dedicated, stricter rate limit** (independent of the general
        auth throttle) to bound token brute-force; exceeding it → `429`.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ResetPasswordRequest' }
            example:
              token: "rt_3f9c0a1b7e2d4c56a8b90c1d2e3f4a5b6c7d8e9f0a1b2c3d"
              newPassword: "An0ther-S3cure-Pass!"
      responses:
        '204':
          description: Password reset; all existing sessions revoked.
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
        default: { $ref: '#/components/responses/ProblemDefault' }

  # =====================================================================================
  # ORGS  (FULL DETAIL)
  # =====================================================================================
  /orgs:
    get:
      tags: [orgs]
      operationId: listOrgs
      summary: List orgs the caller belongs to
      description: Returns only orgs in which the caller holds a membership (tenant-filtered).
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Paginated orgs.
          headers:
            X-RateLimit-Limit: { $ref: '#/components/headers/RateLimitLimit' }
            X-RateLimit-Remaining: { $ref: '#/components/headers/RateLimitRemaining' }
            X-RateLimit-Reset: { $ref: '#/components/headers/RateLimitReset' }
          content:
            application/json:
              schema:
                type: object
                required: [data, page]
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/OrgView' }
                  page: { $ref: '#/components/schemas/PageMeta' }
              example:
                data:
                  - id: 0190f3a2-aaaa-7bbb-8ccc-001122334455
                    name: OmniPizza Inc
                    slug: omnipizza
                    createdAt: "2026-06-01T09:00:00Z"
                    updatedAt: "2026-06-01T09:00:00Z"
                page: { nextCursor: null, hasMore: false, limit: 20 }
        '401': { $ref: '#/components/responses/Unauthorized' }
        default: { $ref: '#/components/responses/ProblemDefault' }
    post:
      tags: [orgs]
      operationId: createOrg
      summary: Create an org
      description: |
        Creates a root-tenant `Org` and an `OWNER` membership for the caller, and — in the same
        transaction — seeds the per-Org **11-agent catalog** (roster, keystone §3) and a trial
        `Subscription` (FREE / TRIALING). `slug` is unique; if omitted, it is derived from `name`.
        RBAC: any authenticated user may create an org. **Anti-abuse:** self-service org creation is
        rate-limited **per user** (bounded count per window) to prevent trial/org-farming and
        shared-quota abuse; exceeding it returns `429`.
      security:
        - sessionCookie: []
          csrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OrgCreate' }
            example: { name: OmniPizza Inc, slug: omnipizza }
      responses:
        '201':
          description: Org created; caller is OWNER.
          headers:
            X-RateLimit-Limit: { $ref: '#/components/headers/RateLimitLimit' }
            X-RateLimit-Remaining: { $ref: '#/components/headers/RateLimitRemaining' }
            X-RateLimit-Reset: { $ref: '#/components/headers/RateLimitReset' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OrgView' }
        '403': { $ref: '#/components/responses/CsrfFailed' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
        default: { $ref: '#/components/responses/ProblemDefault' }

  /orgs/{orgId}:
    parameters:
      - $ref: '#/components/parameters/OrgId'
    get:
      tags: [orgs]
      operationId: getOrg
      summary: Get an org
      description: |
        Caller must be a member of `{orgId}`. A **non-member receives `404`** (the org's existence is
        not leaked — slice-1 §10.2); `403` is reserved for a member with an insufficient role.
      responses:
        '200':
          description: Org detail.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OrgView' }
        '404': { $ref: '#/components/responses/NotFound' }
        default: { $ref: '#/components/responses/ProblemDefault' }
    patch:
      tags: [orgs]
      operationId: updateOrg
      summary: Update an org
      description: "RBAC: OWNER or ADMIN. A non-member receives `404`; insufficient role → `403`."
      security:
        - sessionCookie: []
          csrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OrgUpdate' }
            example: { name: OmniPizza International }
      responses:
        '200':
          description: Updated org.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OrgView' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }
        default: { $ref: '#/components/responses/ProblemDefault' }

  # =====================================================================================
  # MEMBERS  (FULL DETAIL)
  # =====================================================================================
  /orgs/{orgId}/members:
    parameters:
      - $ref: '#/components/parameters/OrgId'
    get:
      tags: [members]
      operationId: listMembers
      summary: List members of an org
      description: Tenant-filtered to `{orgId}`. Any member may read.
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Paginated memberships.
          headers:
            X-RateLimit-Limit: { $ref: '#/components/headers/RateLimitLimit' }
            X-RateLimit-Remaining: { $ref: '#/components/headers/RateLimitRemaining' }
            X-RateLimit-Reset: { $ref: '#/components/headers/RateLimitReset' }
          content:
            application/json:
              schema:
                type: object
                required: [data, page]
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/MembershipView' }
                  page: { $ref: '#/components/schemas/PageMeta' }
              example:
                data:
                  - id: 0190f3a3-bbbb-7ccc-8ddd-001122334455
                    orgId: 0190f3a2-aaaa-7bbb-8ccc-001122334455
                    userId: 0190f3a1-1c2d-7e4f-8a9b-1122334455aa
                    role: OWNER
                    createdAt: "2026-06-01T09:00:00Z"
                    user:
                      id: 0190f3a1-1c2d-7e4f-8a9b-1122334455aa
                      email: gilberto.aspros@gmail.com
                      firstName: Gilberto
                      lastName: Aspros
                      status: ACTIVE
                      createdAt: "2026-06-29T10:00:00Z"
                      updatedAt: "2026-06-29T10:00:00Z"
                page: { nextCursor: null, hasMore: false, limit: 20 }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        default: { $ref: '#/components/responses/ProblemDefault' }
    post:
      tags: [members]
      operationId: addMember
      summary: Invite / add a member by email
      description: |
        Adds a membership to `{orgId}`. If a `User` with the email exists they are added directly;
        otherwise an invitation is created. RBAC: OWNER or ADMIN. Audited.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/MembershipCreate' }
            example: { email: qa.lead@omnipizza.example, role: ADMIN }
      responses:
        '201':
          description: Membership created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MembershipView' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }
        default: { $ref: '#/components/responses/ProblemDefault' }

  /orgs/{orgId}/members/{id}:
    parameters:
      - $ref: '#/components/parameters/OrgId'
      - $ref: '#/components/parameters/PathId'
    patch:
      tags: [members]
      operationId: updateMember
      summary: Change a member's role
      description: "RBAC: OWNER or ADMIN. Cannot demote the last OWNER. Audited."
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/MembershipUpdate' }
            example: { role: MEMBER }
      responses:
        '200':
          description: Updated membership.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MembershipView' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        default: { $ref: '#/components/responses/ProblemDefault' }
    delete:
      tags: [members]
      operationId: removeMember
      summary: Remove a member
      description: "RBAC: OWNER or ADMIN. Cannot remove the last OWNER. Audited."
      responses:
        '204':
          description: Member removed.
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        default: { $ref: '#/components/responses/ProblemDefault' }

  # =====================================================================================
  # PROJECTS  (FULL DETAIL — POST = onboarding)
  # =====================================================================================
  /projects:
    get:
      tags: [projects]
      operationId: listProjects
      summary: List projects in the active org
      description: Tenant-filtered by the session's active `orgId`.
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Paginated projects.
          headers:
            X-RateLimit-Limit: { $ref: '#/components/headers/RateLimitLimit' }
            X-RateLimit-Remaining: { $ref: '#/components/headers/RateLimitRemaining' }
            X-RateLimit-Reset: { $ref: '#/components/headers/RateLimitReset' }
          content:
            application/json:
              schema:
                type: object
                required: [data, page]
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/ProjectView' }
                  page: { $ref: '#/components/schemas/PageMeta' }
              example:
                data:
                  - id: 0190f3b0-1111-7222-8333-444455556666
                    orgId: 0190f3a2-aaaa-7bbb-8ccc-001122334455
                    name: OmniPizza
                    slug: omnipizza-web
                    format: BDD
                    repoProvider: github
                    repoFullName: gsanchezm/omnipizza-web
                    repoBranch: main
                    repoCommit: a1b2c3d
                    repoLastSyncAt: "2026-06-25T19:00:02Z"
                    createdAt: "2026-06-01T09:05:00Z"
                    updatedAt: "2026-06-25T19:00:02Z"
                page: { nextCursor: null, hasMore: false, limit: 20 }
        '401': { $ref: '#/components/responses/Unauthorized' }
        default: { $ref: '#/components/responses/ProblemDefault' }
    post:
      tags: [projects]
      operationId: onboardProject
      summary: Onboard a project (3-step wizard)
      description: |
        **Onboarding action.** Creates a `Project` under the active org and, if repo fields are
        supplied, links the source repo (`repoProvider` + `repoFullName` [+ `repoBranch`]). Seeds the
        project's **11 `ToolBinding` rows** (one per agent; `tool = defaultTool`, `enabled = true`).
        The per-Org agent catalog + trial `Subscription` are seeded earlier at Org creation (see
        `createOrg`), not here. `slug` is unique per org; derived from `name` if omitted.
        RBAC: OWNER or ADMIN.
      security:
        - sessionCookie: []
          csrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProjectCreate' }
            example:
              name: OmniPizza
              format: BDD
              repoProvider: github
              repoFullName: gsanchezm/omnipizza-web
              repoBranch: main
      responses:
        '201':
          description: Project created.
          headers:
            X-RateLimit-Limit: { $ref: '#/components/headers/RateLimitLimit' }
            X-RateLimit-Remaining: { $ref: '#/components/headers/RateLimitRemaining' }
