packages:
  - 'apps/*'
  - 'packages/*'
# Audit #2 (batch C): @nestjs/platform-express pins multer <2.2.0, which carries
# GHSA-72gw-mp4g-v24j (DoS via deeply nested field names) + an aborted-upload DoS.
overrides:
  multer: '>=2.2.0'
allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  '@swc/core': true
  esbuild: true
  prisma: true
minimumReleaseAgeExclude:
  - '@vitest/expect@3.2.7'
  - '@vitest/mocker@3.2.7'
  - '@vitest/pretty-format@3.2.7'
  - '@vitest/runner@3.2.7'
  - '@vitest/snapshot@3.2.7'
  - '@vitest/spy@3.2.7'
  - '@vitest/utils@3.2.7'
  - vitest@3.2.7
